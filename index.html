<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập JavaScript</title>
    <!-- Nhúng Bootstrap 5 từ CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<!-- vh-100 và flexbox giúp đưa card vào giữa màn hình -->
<body class="bg-light vh-100 d-flex align-items-center justify-content-center">

    <!-- Khung Card chính -->
    <div class="card shadow-sm w-100" style="max-width: 450px;">
        <div class="card-body p-4">
            
            <!-- Tiêu đề bài tập -->
            <h3 class="card-title text-center mb-4 text-primary">Bài Tập Tính Toán</h3>
            
            <!-- Form nhập liệu -->
            <form id="console_Form">
                <!-- Ô nhập thứ nhất -->
                <div class="mb-3">
                    <label for="tenUser" class="form-label fw-bold">Nhập tên của bạn:</label>
                    <input type="text" class="form-control" id="tenNguoiDung" placeholder="Nhập tên của bạn: ">
                </div>
                <div class="mb-3">
                    <label for="tuoiUser" class="form-label fw-bold">Nhập tuổi của bạn:</label>
                    <input type="number" class="form-control" id="tuoiNguoiDung" placeholder="Nhập tuổi của bạn: ">
                </div>
                
                <!-- Nút bấm xử lý -->
                <button type="button" id="btnHienThi" class="btn btn-primary w-100 fw-bold">Hello</button>
            </form>

            <div id="khungHienThi" class="alert alert-success mt-3 d-none text-center fw-bold">
                Kết quả sẽ hiển thị ở đây!
            </div>

        </div>
    </div>
    <script src="./js/index.js"></script>
</body>
</html>
